name: Auto label Issues

on:
  issues:
    types:
      - opened
      - reopened
      - edited
      - unlabeled

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Gemini Labeler
        id: gemini_call
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          input_prompt: |
            Analyze the following GitHub issue:

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Available Labels:
            bug, enhancement, documentation, question, help wanted, good first issue

            Choose the 1-2 most relevant labels.
            Return ONLY a comma-separated list.

      - name: Apply Labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = "${{ steps.gemini_call.outputs.response }}"
              .split(',')
              .map(l => l.trim());

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
            
